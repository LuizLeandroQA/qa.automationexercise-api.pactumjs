name: API Tests (PactumJS)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL da API"
        required: false
        default: "https://serverest.dev"
      timeout:
        description: "Timeout (ms)"
        required: false
        default: "10000"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        env:
          BASE_URL: https://serverest.dev
          TIMEOUT: "10000"
        run: npm test